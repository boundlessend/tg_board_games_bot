name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Ruff (lint)
        run: ruff check .

      - name: Mypy (types)
        run: mypy .

      - name: Tests
        run: pytest --cov=. --cov-report=term-missing
