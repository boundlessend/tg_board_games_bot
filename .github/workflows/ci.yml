name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff mypy

      - name: Ruff (lint)
        run: ruff check .

      - name: Mypy (types)
        run: mypy --ignore-missing-imports .

      - name: Compile
        run: python -m compileall bot.py config.py constants.py database.py exceptions.py keyboards.py handlers services

      - name: Smoke tests
        run: python tests/smoke.py
